<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdontoCare | Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light" data-page="estoque">
  
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">OdontoCare</a>
      <span class="navbar-text me-3 ms-auto" id="infoUsuario"></span>
      <button id="btnThemeToggle" class="btn btn-link text-white p-2" title="Alternar tema">🌙</button>
      <button class="btn btn-outline-light btn-sm ms-2" onclick="logout()">Sair</button>
    </div>
  </nav>

  <main class="container py-4">
    <div class="card border-0 shadow-sm rounded-4 p-4">
      <h2 class="h4 mb-4">Gerenciamento de Materiais</h2>
      
      <form id="formEstoque" class="row g-3 mb-4">
        <div class="col-md-4">
          <input type="text" id="nomeItem" class="form-control" placeholder="Nome do Item" required>
        </div>
        <div class="col-md-3">
          <input type="number" id="quantidadeItem" class="form-control" placeholder="Quantidade" min="0" required>
        </div>
        <div class="col-md-3">
          <input type="number" id="minimoItem" class="form-control" placeholder="Estoque Mínimo" min="1" required>
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-primary w-100">Adicionar</button>
        </div>
      </form>

      <div class="mb-3">
        <input 
          type="text" 
          id="buscaEstoque" 
          class="form-control" 
          placeholder="Buscar item no estoque...">
      </div>

      <div class="table-responsive">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>Item</th>
              <th>Quantidade</th>
              <th>Mínimo</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="listaEstoque"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/script.js"></script>
<script src="js/dentistas.js"></script>   
<script src="js/modal.js"></script>
</body>
</html>
