<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OdontoCare | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-body-tertiary">
  <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="row justify-content-center w-100">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <h1 class="h3 fw-bold text-primary mb-2">OdontoCare</h1>
              <p class="text-muted mb-0">Acesse o sistema odontológico</p>
            </div>

            <div class="alert alert-info small">
              <strong>Usuários de teste:</strong><br>
              Admin: <code>admin@odonto.com</code> / <code>admin</code><br>
              Recepção: <code>recepcao@odonto.com</code> / <code>recepcao</code><br>
              Dentista: <code>dentista@odonto.com</code> / <code>dentista</code>
            </div>

            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="Digite seu e-mail" required />
              </div>
              <div class="mb-3">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" id="senha" class="form-control" placeholder="Digite sua senha" required />
              </div>
              <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>

            <div id="loginMensagem" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
