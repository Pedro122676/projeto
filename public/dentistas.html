<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>OdontoCare | Dentistas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light" data-page="dentistas">
 
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">OdontoCare</a>
      <span class="navbar-text me-3 ms-auto" id="infoUsuario"></span>
      <button id="btnThemeToggle" class="btn btn-link text-white p-2" title="Alternar tema">🌙</button>
      <button class="btn btn-outline-light btn-sm ms-2" onclick="logout()">Sair</button>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 p-3">
          <h5>Cadastrar Dentista</h5>
          <form id="formDentista">
            <input type="text" id="nomeDentista" class="form-control mb-2" placeholder="Nome" required>
            <input type="text" id="croDentista" class="form-control mb-2" placeholder="CRO" required>
            <input type="text" id="especialidade" class="form-control mb-3" placeholder="Especialidade">
            <button type="submit" class="btn btn-primary w-100">Salvar</button>
          </form>
        </div>
      </div>
      <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4 p-3">
          <h5 class="mb-3">Lista de Dentistas</h5>
          
          <div class="mb-3">
            <input type="text" id="buscaDentista" class="form-control" placeholder="Buscar por nome ou CRO...">
          </div>

          <table class="table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>CRO</th>
                <th>Especialidade</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="listaDentistas"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/script.js"></script>
  <script src="js/dentistas.js"></script>   
  <script src="js/modal.js"></script>
</body>
</html>
