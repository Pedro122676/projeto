<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdontoCare | Financeiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light" data-page="financeiro">
  
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">OdontoCare</a>
      <span class="navbar-text me-3 ms-auto" id="infoUsuario"></span>
      <button id="btnThemeToggle" class="btn btn-link text-white p-2" title="Alternar tema">🌙</button>
      <button class="btn btn-outline-light btn-sm ms-2" onclick="logout()">Sair</button>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row">
      <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 p-3 mb-4">
          <h5 class="mb-3">Nova Movimentação</h5>
          <form id="formFinanceiro">
            <select id="tipoFinanceiro" class="form-select mb-2">
              <option value="Receita">Receita</option>
              <option value="Despesa">Despesa</option>
            </select>
            <input type="text" id="descricaoFinanceiro" class="form-control mb-2" placeholder="Descrição" required>
            <input type="number" step="0.01" id="valorFinanceiro" class="form-control mb-3" placeholder="Valor R$" required>
            <button type="submit" class="btn btn-success w-100">Registrar</button>
          </form>
        </div>
      </div>

      <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4 p-3">
          <h5 class="mb-3">Histórico de Movimentações</h5>
          
          <div class="mb-3">
            <input type="text" id="buscaFinanceiro" class="form-control" placeholder="Buscar por descrição...">
          </div>

          <div class="table-responsive">
            <table class="table table-hover table-striped">
              <thead class="table-light">
                <tr>
                  <th class="ps-4" style="width: 12%;">TIPO</th>
                  <th class="ps-4" style="width: 35%;">DESCRIÇÃO</th>
                  <th class="ps-4 text-end" style="width: 28%;">VALOR</th>
                  <th class="ps-4" style="width: 25%;">DATA</th>
                </tr>
              </thead>
              <tbody id="listaFinanceiro"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/script.js"></script>
  <script src="js/financeiro.js"></script>
  <script src="js/modal.js"></script>
</body>
</html>
