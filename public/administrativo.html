<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OdontoCare | Painel Administrativo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-light" data-page="administrativo">
  
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">OdontoCare</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuAdmin">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menuAdmin">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="pacientes.html">Pacientes</a></li>
          <li class="nav-item"><a class="nav-link" href="dentistas.html">Dentistas</a></li>
          <li class="nav-item"><a class="nav-link" href="consultas.html">Agendamentos</a></li>
          <li class="nav-item"><a class="nav-link active" href="administrativo.html">Painel Administrativo</a></li>
          <li class="nav-item"><a class="nav-link" href="financeiro.html">Financeiro</a></li>
          <li class="nav-item"><a class="nav-link" href="estoque.html">Estoque</a></li>
        </ul>
        <span class="navbar-text me-3" id="infoUsuario"></span>
        <button id="btnThemeToggle" class="btn btn-link text-white p-2" title="Alternar tema">🌙</button>
        <button class="btn btn-outline-light btn-sm ms-2" onclick="logout()">Sair</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h1 class="h3 mb-4 fw-bold">Gestão Administrativa</h1>

    <div class="row g-4 mb-4">
      <div class="col-12 col-md-6 col-xl-3">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body">
            <h5 class="text-muted small text-uppercase">Pacientes</h5>
            <p class="display-6 fw-bold mb-0" id="adminPacientes">0</p>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-xl-3">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body">
            <h5 class="text-muted small text-uppercase">Dentistas</h5>
            <p class="display-6 fw-bold mb-0" id="adminDentistas">0</p>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-xl-3">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body">
            <h5 class="text-muted small text-uppercase">Consultas</h5>
            <p class="display-6 fw-bold mb-0" id="adminConsultas">0</p>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-xl-3">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body">
            <h5 class="text-muted small text-uppercase">Itens Estoque</h5>
            <p class="display-6 fw-bold mb-0" id="adminEstoque">0</p>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-12 col-lg-6">
        <div class="card border-0 shadow-sm rounded-4 h-100">
          <div class="card-body">
            <h2 class="h5 mb-3">Consultas por Status</h2>
            <ul class="list-group list-group-flush" id="listaStatusAdmin"></ul>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-6">
        <div class="card border-0 shadow-sm rounded-4 h-100">
          <div class="card-body">
            <h2 class="h5 mb-3 text-danger">Alertas de Estoque Baixo</h2>
            <ul class="list-group list-group-flush" id="listaEstoqueBaixoAdmin"></ul>
            <div class="mt-3">
              <a href="estoque.html" class="btn btn-sm btn-outline-primary">Ir para Estoque</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/script.js"></script>
  <script src="js/administrativo.js"></script>
  <script src="js/modal.js"></script>
</body>
</html>
