<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdontoCare | Consultas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light" data-page="consultas">
  
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">OdontoCare</a>
      <span class="navbar-text me-3 ms-auto" id="infoUsuario"></span>
      <button id="btnThemeToggle" class="btn btn-link text-white p-2" title="Alternar tema">🌙</button>
      <button class="btn btn-outline-light btn-sm ms-2" onclick="logout()">Sair</button>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">

      <div class="col-md-4">
        <div class="card shadow-sm border-0 rounded-4 p-3">
          <h4 class="mb-3">Nova Consulta</h4>
          <form id="formConsulta">
            <div class="mb-2">
              <label class="form-label">Paciente</label>
              <input type="text" id="pacienteConsulta" class="form-control" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Dentista</label>
              <input type="text" id="dentistaConsulta" class="form-control" required>
            </div>
            <div class="row">
              <div class="col-6 mb-2">
                <label class="form-label">Data</label>
                <input type="date" id="dataConsulta" class="form-control" required>
              </div>
              <div class="col-6 mb-2">
                <label class="form-label">Hora</label>
                <input type="time" id="horaConsulta" class="form-control" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Status</label>
              <select id="statusConsulta" class="form-select">
                <option value="Agendada">Agendada</option>
                <option value="Confirmada">Confirmada</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Agendar</button>
          </form>
        </div>
      </div>

      <div class="col-md-8">
        <div class="card shadow-sm border-0 rounded-4 p-3">
          <h4 class="mb-3">Agenda</h4>
          
          <div class="mb-3">
            <input 
              type="text" 
              id="buscaConsulta" 
              class="form-control" 
              placeholder="Buscar por paciente ou dentista...">
          </div>

          <div class="table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>Paciente</th>
                  <th>Dentista</th>
                  <th>Data</th>
                  <th>Hora</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="listaConsultas"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/script.js"></script>
<script src="js/dentistas.js"></script>   
<script src="js/modal.js"></script>
</body>
</html>
