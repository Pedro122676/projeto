<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OdontoCare | Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light" data-page="index">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">OdontoCare</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="pacientes.html">Pacientes</a></li>
          <li class="nav-item"><a class="nav-link" href="consultas.html">Consultas</a></li>
          
          <li class="nav-item admin-only"><a class="nav-link" href="administrativo.html">Painel Admin</a></li>
          <li class="nav-item admin-only"><a class="nav-link" href="estoque.html">Estoque</a></li>
          <li class="nav-item admin-only"><a class="nav-link" href="dentistas.html">Dentistas</a></li>
          <li class="nav-item admin-only"><a class="nav-link" href="financeiro.html">Financeiro</a></li>
        </ul>
        
        <span class="navbar-text me-3" id="infoUsuario"></span>
        <button id="btnThemeToggle" class="btn btn-link text-white p-2" title="Alternar tema">🌙</button>
        <button class="btn btn-outline-light btn-sm ms-2" onclick="logout()">Sair</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="card shadow-sm border-0 rounded-4">
          <div class="card-body">
            <h5 class="card-title">Saldo Financeiro</h5>
            <p class="display-6 fw-bold" id="saldoFinanceiro">R$ 0,00</p>
            <p class="text-muted mb-3">Receitas - Despesas</p>
            <a href="financeiro.html" class="btn btn-primary btn-sm">Ver financeiro</a>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-4 mt-1">
      <div class="col-12 col-lg-8">
        <div class="card shadow-sm border-0 rounded-4 h-100">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="h5 mb-0">Próximas consultas</h2>
              <a href="consultas.html" class="btn btn-outline-primary btn-sm">Ver todas</a>
            </div>
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead>
                  <tr>
                    <th>Paciente</th>
                    <th>Dentista</th>
                    <th>Data</th>
                    <th>Hora</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="dashboardConsultas"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-4 admin-only">
        <div class="card shadow-sm border-0 rounded-4 h-100">
          <div class="card-body">
            <h2 class="h5 mb-3">Alertas de estoque</h2>
            <ul class="list-group list-group-flush" id="alertasEstoque"></ul>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/script.js"></script>
<script src="js/dentistas.js"></script>   
<script src="js/modal.js"></script>
</body>
</html>
